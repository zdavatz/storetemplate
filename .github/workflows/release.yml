name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build universal binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/storetemplate \
            target/x86_64-apple-darwin/release/storetemplate \
            -output target/release/storetemplate-universal

      - name: Create .app bundle
        run: |
          APP="target/release/StoreTemplate.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/storetemplate-universal "$APP/Contents/MacOS/storetemplate"
          if [ -f macos/AppIcon.icns ]; then
            cp macos/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          sed -e "s|<string>1.0.0</string>|<string>${VERSION}</string>|" \
              -e "s|<string>1</string>|<string>${VERSION}</string>|" \
              macos/Info.plist > "$APP/Contents/Info.plist"

      - name: Import signing certificates
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          MACOS_DEVELOPER_ID_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          security list-keychains -d user -s build.keychain

          echo "$MACOS_CERTIFICATE" | base64 --decode > app_cert.p12
          security import app_cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          rm app_cert.p12

          if [ -n "$MACOS_INSTALLER_CERTIFICATE" ]; then
            echo "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode > installer_cert.p12
            security import installer_cert.p12 -k build.keychain -P "$MACOS_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
            rm installer_cert.p12
          fi

          if [ -n "$MACOS_DEVELOPER_ID_CERTIFICATE" ]; then
            echo "$MACOS_DEVELOPER_ID_CERTIFICATE" | base64 --decode > devid_cert.p12
            security import devid_cert.p12 -k build.keychain -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
            rm devid_cert.p12
          fi

          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          echo "Available signing identities:"
          security find-identity -v build.keychain

      - name: Code sign app for DMG (Developer ID)
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          IDENTITY=$(security find-identity -v build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No 'Developer ID Application' certificate found. Available identities:"
            security find-identity -v build.keychain
            exit 1
          fi
          echo "Signing with: $IDENTITY"
          codesign --force --options runtime \
            --sign "$IDENTITY" \
            --entitlements macos/entitlements-devid.plist \
            --deep \
            target/release/StoreTemplate.app

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGING=$(mktemp -d)
          cp -R target/release/StoreTemplate.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "StoreTemplate" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "storetemplate-${VERSION}-macos-universal.dmg"
          rm -rf "$STAGING"

      - name: Notarize DMG (if API key available)
        if: env.APPLE_API_KEY_P8 != ''
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="storetemplate-${VERSION}-macos-universal.dmg"

          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          xcrun notarytool submit "$DMG" \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: storetemplate-*-macos-universal.dmg

      - name: Build App Store package (if API key available)
        if: env.APPLE_API_KEY_P8 != ''
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="target/release/StoreTemplate.app"

          APP_IDENTITY=$(security find-identity -v build.keychain | grep "Mac App Distribution\|3rd Party Mac Developer Application" | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -n "$APP_IDENTITY" ]; then
            echo "Signing app with: $APP_IDENTITY"
            codesign --force --options runtime \
              --sign "$APP_IDENTITY" \
              --entitlements macos/entitlements-appstore.plist \
              --deep \
              "$APP"
          fi

          INSTALLER_IDENTITY=$(security find-identity -v build.keychain | grep "Mac Installer Distribution\|3rd Party Mac Developer Installer" | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -n "$INSTALLER_IDENTITY" ]; then
            echo "Signing pkg with: $INSTALLER_IDENTITY"
            productbuild --component "$APP" /Applications \
              --sign "$INSTALLER_IDENTITY" \
              "storetemplate-${VERSION}-macos-appstore.pkg"
          else
            productbuild --component "$APP" /Applications \
              "storetemplate-${VERSION}-macos-appstore.pkg"
          fi

          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          TRANSPORTER="/Applications/Transporter.app/Contents/itms/bin/iTMSTransporter"
          if [ -x "$TRANSPORTER" ]; then
            echo "Using iTMSTransporter"
            "$TRANSPORTER" -m upload \
              -f "storetemplate-${VERSION}-macos-appstore.pkg" \
              -apiKey "$APPLE_API_KEY_ID" \
              -apiIssuer "$APPLE_API_ISSUER_ID" || echo "WARNING: iTMSTransporter upload failed"
          else
            echo "iTMSTransporter not found, using altool"
            xcrun altool --upload-app \
              --file "storetemplate-${VERSION}-macos-appstore.pkg" \
              --type macos \
              --apiKey "$APPLE_API_KEY_ID" \
              --apiIssuer "$APPLE_API_ISSUER_ID" || echo "WARNING: App Store upload failed"
          fi

      - name: Upload App Store pkg artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-appstore-pkg
          path: storetemplate-*-macos-appstore.pkg
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Windows release
        run: cargo build --release
      - name: Package Windows binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp target/release/storetemplate.exe dist/
          cd dist && 7z a ../storetemplate-${VERSION}-windows-x64.zip storetemplate.exe
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: storetemplate-*-windows-x64.zip

  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 desktop-file-utils libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Build release binary
        run: cargo build --release
      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/storetemplate AppDir/usr/bin/

          cat > AppDir/storetemplate.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=StoreTemplate
          Comment=App Store Submission Template Generator
          Exec=storetemplate
          Icon=storetemplate
          Type=Application
          Categories=Development;Utility;
          DESKTOP

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/storetemplate" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          ln -sf usr/share/icons/hicolor/256x256/apps/storetemplate.png AppDir/storetemplate.png 2>/dev/null || true
      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir storetemplate-${VERSION}-linux-x86_64.AppImage
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-build
          path: storetemplate-*-linux-x86_64.AppImage

  release:
    needs: [build-macos, build-windows, build-appimage]
    if: always() && (needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-build/*.zip
            artifacts/appimage-build/*.AppImage
            artifacts/macos-appstore-pkg/*.pkg
          generate_release_notes: true
