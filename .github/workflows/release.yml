name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build macOS release
        run: cargo build --release
      - name: Create app bundle
        run: |
          mkdir -p StoreTemplate.app/Contents/MacOS
          mkdir -p StoreTemplate.app/Contents/Resources
          cp target/release/storetemplate StoreTemplate.app/Contents/MacOS/
          cat > StoreTemplate.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>StoreTemplate</string>
            <key>CFBundleDisplayName</key>
            <string>StoreTemplate</string>
            <key>CFBundleIdentifier</key>
            <string>org.storetemplate.app</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleShortVersionString</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleExecutable</key>
            <string>storetemplate</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
      - name: Create DMG
        run: |
          hdiutil create -volname "StoreTemplate" -srcfolder StoreTemplate.app -ov -format UDZO storetemplate-macos-${GITHUB_REF_NAME}.dmg
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: '*.dmg'

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Windows release
        run: cargo build --release
      - name: Package Windows binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/storetemplate.exe dist/
          cd dist && 7z a ../storetemplate-windows-${GITHUB_REF_NAME}.zip storetemplate.exe
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: '*.zip'

  build-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 desktop-file-utils libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Build release binary
        run: cargo build --release
      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/storetemplate AppDir/usr/bin/

          cat > AppDir/storetemplate.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=StoreTemplate
          Comment=App Store Submission Template Generator
          Exec=storetemplate
          Icon=storetemplate
          Type=Application
          Categories=Development;Utility;
          DESKTOP

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/storetemplate" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Generate a simple SVG icon
          cat > AppDir/usr/share/icons/hicolor/256x256/apps/storetemplate.png << 'ICON'
          ICON
          # Link icon and desktop file to AppDir root
          ln -sf usr/share/icons/hicolor/256x256/apps/storetemplate.png AppDir/storetemplate.png
      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir storetemplate-linux-${GITHUB_REF_NAME}.AppImage
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-build
          path: '*.AppImage'

  create-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-appimage]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
